services:
  - type: web
    name: rezumae-ai
    env: python
    region: oregon
    plan: free

    rootDir: .

    buildCommand: >
      pip install -r requirements.txt &&
      python download_model.py

    startCommand: >
      python -m uvicorn main:app
      --host 0.0.0.0
      --port $PORT
      --workers 1
      --timeout-keep-alive 75

    envVars:
      - key: GGUF_REPO
        value: bartowski/SmolLM2-135M-Instruct-GGUF
      - key: GGUF_FILE
        value: SmolLM2-135M-Instruct-Q4_K_M.gguf
      - key: ALLOWED_ORIGINS
        value: https://rezumae.pro

    healthCheckPath: /health
